version: '3.8'

services:
  # API Service
  api:
    build: .
    container_name: stroke-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stroke-network

  # Dashboard Service
  dashboard:
    build: .
    container_name: stroke-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    networks:
      - stroke-network

networks:
  stroke-network:
    driver: bridge

volumes:
  models-data:
